  <!-- Anti-flash: apply saved theme before first paint.
       data-theme  = actual applied theme (dark | light)
       data-theme-mode = user preference (auto | dark | light)
       Defaults to "auto" when nothing is stored. -->
  <script>
    (function(){
      var mode = localStorage.getItem('memoire-theme') || 'auto';
      var isDark = mode === 'dark';
      if (mode === 'auto') {
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme-mode', mode);
      document.documentElement.style.backgroundColor = isDark ? '#161318' : '#f5f0eb';
      var mc = document.getElementById('meta-theme-color');
      if (mc) mc.content = isDark ? '#161318' : '#f5f0eb';
    })();
  </script>
